{% extends 'base.html' %}

{% block content %}

<div class="login-page">

    <div class="login-card shadow-lg">

        <div class="text-center mb-4">

            <div class="forgot-icon">

                🔐

            </div>

            <h2 class="fw-bold">

                Forgot Password?

            </h2>

            <p class="text-muted">

                Enter your registered email and receive a reset link.

            </p>

        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">

                    Email Address

                </label>

                {{ form.email }}

            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">

                Send Reset Link

            </button>

        </form>

        <div class="text-center mt-4">

            <a href="/login/" class="btn btn-outline-secondary">

                ← Back to Login

            </a>

        </div>

    </div>

</div>

{% endblock %}
