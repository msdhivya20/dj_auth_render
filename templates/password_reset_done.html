{% extends 'base.html' %}

{% block content %}

<div class="login-page">

    <div class="login-card shadow-lg text-center">

        <div class="mail-icon">

            📧

        </div>

        <h2 class="fw-bold mb-3">

            Check Your Gmail

        </h2>

        <p class="text-muted mb-4">

            If an account exists with that email address, a password reset link has been sent.

        </p>

        <p class="small text-secondary">

            Check Inbox, Spam, or Promotions folder.

        </p>

        <div class="mt-4">

            <a href="/login/" class="btn btn-primary me-2">

                Back to Login

            </a>

            <a href="/password-reset/" class="btn btn-outline-secondary">

                Try Again

            </a>

        </div>

    </div>

</div>

{% endblock %}
