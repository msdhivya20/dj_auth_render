{% extends 'base.html' %}

{% block content %}

<div class="login-page">

<div class="login-card shadow-lg">

<div class="text-center mb-4">

<h2 class="fw-bold">

Welcome Back

</h2>

<p class="text-muted">

Login to continue

</p>

</div>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">

Username

</label>

<input
type="text"
class="form-control"
name="username"
placeholder="Enter Username"
required>

</div>

<div class="mb-4">

<label class="form-label">

Password

</label>

<input
type="password"
class="form-control"
name="password"
placeholder="Enter Password"
required>

</div>

<button
class="btn btn-success w-100 py-2">

Login

</button>

</form>

<div class="extra-links">

<a href="/password-reset/">

Forgot Password?

</a>

<a href="/forgot-username/">

Forgot Username?

</a>

</div>

<div class="text-center mt-4">

<p>

Don't have an account?

<a
href="/signup/"
class="fw-bold text-decoration-none">

Sign Up

</a>

</p>

<a
href="/"
class="btn btn-outline-secondary">

← Return Home

</a>

</div>

</div>

</div>

{% endblock %}
