{% extends 'base.html' %}

{% block content %}

<div class="login-page">

    <div class="login-card shadow-lg">

        <div class="text-center mb-4">

            <div class="reset-icon">

                🔑

            </div>

            <h2 class="fw-bold">

                Create New Password

            </h2>

            <p class="text-muted">

                Enter your new password below.

            </p>

        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">

                    New Password

                </label>

                {{ form.new_password1 }}

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Confirm Password

                </label>

                {{ form.new_password2 }}

            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">

                Update Password

            </button>

        </form>

        <div class="text-center mt-4">

            <a href="/login/" class="btn btn-outline-secondary">

                ← Back to Login

            </a>

        </div>

    </div>

</div>

{% endblock %}
